spring:
  application:
    name: game_service
  docker:
    compose:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/game_service?createDatabaseIfNotExist=true&useUnicode=yes&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:kumuditha}
    password: ${SPRING_DATASOURCE_PASSWORD:kumuditha1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8004}
  servlet:
    context-path: /api

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.bubble_breath: ${APP_LOG_LEVEL:DEBUG}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
